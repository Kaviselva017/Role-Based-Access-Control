services:
  - type: web
    name: dragon-intel-chatbot-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 4 --timeout 120"
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: CHROMA_DIR
        value: "chroma_db"
      - key: PYTHON_VERSION
        value: "3.10"
